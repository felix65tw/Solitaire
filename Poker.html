    // ==================== 移動規則檢查函數 ====================
    /**
     * 檢查是否可以移動到花色區
     * @param {Object} card - 卡片物件
     * @param {Array} foundation - 花色區陣列
     * @returns {boolean} - 是否可以移動
     */
    function canMoveToFoundation(card, foundation) {
        if (foundation.length === 0) return card.rank === 1; // 空的花色區只能放Ace
        const topCard = foundation[foundation.length - 1]; // 花色區最上面的牌
        return card.suit === topCard.suit && card.rank === topCard.rank + 1; // 同花色且數字連續
    }
    
    /**
     * 檢查是否可以移動到表格
     * @param {Object} card - 卡片物件
     * @param {Array} tableauPile - 表格列陣列
     * @returns {boolean} - 是否可以移動
     */
    function canMoveToTableau(card, tableauPile) {
        if (tableauPile.length === 0) return card.rank === 13; // 空的表格列只能放King
        const topCard = tableauPile[tableauPile.length - 1]; // 表格列最上面的牌
        return card.color !== topCard.color && card.rank === topCard.rank - 1; // 不同顏色且數字連續
    }

    // ==================== 佈局計算函數 ====================
    
    /**
     * 佈局所有槽位
     */
    function layoutSlots() {
        const board = document.getElementById('game-board');
        const w = board.clientWidth; // 遊戲區域寬度
        
        // 建立測量元素計算卡片尺寸 - 修正版本
        const measure = document.createElement('div');
        measure.className = 'slot';
        measure.style.position = 'absolute';
        measure.style.visibility = 'hidden';
        board.appendChild(measure);
        
        // 強制重新計算樣式
        void measure.offsetWidth;
        
        // 使用 getComputedStyle 確保獲取正確的尺寸
        const computedStyle = getComputedStyle(measure);
        cardSize.width = parseFloat(computedStyle.width);
        cardSize.height = parseFloat(computedStyle.height);
        
        // 如果尺寸為0，使用 CSS 變數計算
        if (cardSize.width === 0 || cardSize.height === 0) {
            const rootStyle = getComputedStyle(document.documentElement);
            const cardWidth = rootStyle.getPropertyValue('--card-width').trim();
            const cardHeight = rootStyle.getPropertyValue('--card-height').trim();
            const maxW = rootStyle.getPropertyValue('--max-w').trim();
            const maxH = rootStyle.getPropertyValue('--max-h').trim();
            
            // 檢查是否為百分比值
            if (cardWidth.includes('vw')) {
                const vwValue = parseFloat(cardWidth) / 100 * window.innerWidth;
                const maxWValue = parseFloat(maxW);
                cardSize.width = Math.min(vwValue, maxWValue);
            } else {
                cardSize.width = parseFloat(cardWidth);
            }
            
            if (cardHeight.includes('vw')) {
                const vwValue = parseFloat(cardHeight) / 100 * window.innerWidth;
                const maxHValue = parseFloat(maxH);
                cardSize.height = Math.min(vwValue, maxHValue);
            } else {
                cardSize.height = parseFloat(cardHeight);
            }
        }
        
        board.removeChild(measure);

        // 檢查是否為手機版
        const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
        if (isMobile) {
            // 限制手機上最大卡片尺寸
            const maxCardWidth = Math.min(cardSize.width, GAME_CONFIG.layout.mobileMaxCardWidth); // 從70增加到75
            const maxCardHeight = Math.min(cardSize.height, GAME_CONFIG.layout.mobileMaxCardHeight); // 從98增加到105
            cardSize.width = maxCardWidth;
            cardSize.height = maxCardHeight;
        }

        // 計算間距
        const gap = Math.max(0.5, (w - (cardSize.width * 7)) / 8); // 最小間距0.5px
        
        /**
         * 設定槽位位置
         * @param {string} id - 槽位ID
         * @param {number} x - X座標
         * @param {number} y - Y座標
         */
        const setPos = (id, x, y) => {
            const el = document.getElementById(id);
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            // 儲存位置資訊
            slotPositions[id] = { 
                left: x, top: y, right: x + cardSize.width, bottom: y + cardSize.height,
                cx: x + cardSize.width/2, cy: y + cardSize.height/2
            };
        };

        // 上方區域佈局
        const topRowY = GAME_CONFIG.layout.topRowY;
        
        // 計算三張牌需要的總寬度：卡片寬度 + 2 * (卡片寬度 * 0.3)
        const wasteTotalWidth = cardSize.width * (1 + GAME_CONFIG.layout.wasteCardOverlap * 2);
        
        if (state.handMode === 'right') {
            // 右手模式：花色區在左，廢牌堆在中間（靠右），牌堆在最右邊
            // 1. 四個花色區（安置區）放在最左邊
            for(let i=0; i<4; i++) {
                setPos(`slot-f${i}`, gap + i * (cardSize.width + gap), topRowY);
            }
            
            // 2. 廢牌堆放在牌堆左邊，但要為三張牌留出空間，向左移動
            const wasteX = w - gap - cardSize.width - wasteTotalWidth - gap;
            setPos('slot-waste', wasteX, topRowY);
            
            // 3. 牌堆（蓋牌區）放在最右邊
            const stockX = w - gap - cardSize.width;
            setPos('slot-stock', stockX, topRowY);
        } else {
            // 左手模式：牌堆在左，廢牌堆在牌堆右邊，花色區在右邊
            const stockX = gap;
            setPos('slot-stock', stockX, topRowY);
            
            const wasteX = stockX + cardSize.width + gap;
            setPos('slot-waste', wasteX, topRowY);
            
            const foundationsTotalWidth = 4 * cardSize.width + 3 * gap;
            const foundationsRight = w - gap;
            const foundationsLeft = foundationsRight - foundationsTotalWidth;
            
            for(let i=0; i<4; i++) {
                const foundationX = foundationsLeft + i * (cardSize.width + gap);
                setPos(`slot-f${i}`, foundationX, topRowY);
            }
        }
        
        // 下方七列表格佈局
        const tableauY = topRowY + cardSize.height + (isMobile ? 10 : 30); // 手機上減少間距
        for(let i=0; i<7; i++) {
            let x = gap * (i+1) + cardSize.width * i;
            setPos(`slot-t${i}`, x, tableauY);
        }
    }

    // ==================== 渲染引擎函數 ====================
    /**
     * 渲染遊戲畫面
     */
    function render() {
        const layer = document.getElementById('card-layer');
        layer.innerHTML = ''; // 清空圖層

        /**
         * 繪製單張卡片
         * @param {Object} card - 卡片物件
         * @param {number} x - X座標
         * @param {number} y - Y座標
         * @param {string} type - 卡片類型
         * @param {number} pileIdx - 所在堆疊索引
         * @param {number} cardIdx - 卡片在堆疊中的索引
         * @param {boolean} isWaste - 是否為廢牌堆卡片
         * @param {number} wasteOffset - 廢牌堆偏移量
         */
        const drawCard = (card, x, y, type, pileIdx, cardIdx, isWaste = false, wasteOffset = 0) => {
            const div = document.createElement('div');
            div.className = `card ${card.faceUp ? '' : 'back'}`;
            
            // 計算卡片位置
            let finalX = x;
            if (isWaste && wasteOffset > 0) {
                finalX += wasteOffset;
            }
            
            div.style.left = finalX + 'px';
            div.style.top = y + 'px';
            div.dataset.id = card.id;
            div.dataset.type = type;
            div.dataset.pileIdx = pileIdx;
            div.dataset.cardIdx = cardIdx;
            div.dataset.text = card.text; // 添加牌面文字用於CSS選擇器

            if (card.faceUp) {
                div.classList.add(card.color);
                div.innerHTML = `
                    <div class="card-face">
                        <div class="card-num ${card.color}">${card.text}</div>
                        <div class="card-suit-top ${card.color}">${card.suit}</div>
                        <div class="card-center-suit ${card.color}">${card.suit}</div>
                    </div>
                `;
                
                // 桌面版點擊反應：使用 click / dblclick（避免 mousedown + setTimeout 造成延遲）
                // 注意：拖曳時不會觸發 click；因此不影響拖牌操作
                if (autoMoveOnClick) {
                    div.addEventListener('click', () => {
                        if (isDrawing || isAutoFlying) return;
                        handleDoubleClick(type, pileIdx, cardIdx, card.id);
                    });
                    div.addEventListener('dblclick', () => {
                        if (isDrawing || isAutoFlying) return;
                        handleDoubleClick(type, pileIdx, cardIdx, card.id);
                    });
                }

                // 添加拖曳事件監聽器
                if (type !== 'waste' || cardIdx === state.waste.length - 1) {
                    div.addEventListener('mousedown', (e) => startDrag(e, type, pileIdx, cardIdx));
                    div.addEventListener('touchstart', (e) => startDrag(e, type, pileIdx, cardIdx), {passive: false});
                }
                
            } else {
                // 背面朝上的卡片添加點擊事件
                if (type === 'stock') {
                    div.addEventListener('click', () => drawStockWithAnimation());
                } else if (type === 'tableau') {
                    const pile = state.tableau[pileIdx];
                    if (cardIdx === pile.length - 1) {
                        const flipHandler = (e) => {
                            e.stopPropagation();
                            flipTableauCard(pileIdx);
                        };
                        div.addEventListener('click', flipHandler);
                        div.addEventListener('touchend', (e) => {
                            e.preventDefault();
                            flipHandler(e);
                        }, { passive: false });
                    }
                }
            }
            layer.appendChild(div);
        };

        // 繪製牌堆
        const sPos = slotPositions['slot-stock'];
        if (state.stock.length > 0) {
            // 創建牌堆卡片
            const stockDiv = document.createElement('div');
            stockDiv.className = 'card back';
            stockDiv.style.left = sPos.left + 'px';
            stockDiv.style.top = sPos.top + 'px';
            stockDiv.dataset.type = 'stock';
            
            // 添加牌堆剩餘數量顯示（根據設定決定是否顯示）
            if (state.showCardCount) {
                const countDiv = document.createElement('div');
                countDiv.className = 'card-count';
                countDiv.textContent = state.stock.length;
                stockDiv.appendChild(countDiv);
            }
            
            stockDiv.addEventListener('click', () => drawStockWithAnimation());
            layer.appendChild(stockDiv);
        } else {
            // 牌堆為空時顯示重新整理按鈕
            const emptyStock = document.createElement('div');
            emptyStock.style.cssText = `position:absolute; left:${sPos.left}px; top:${sPos.top}px; width:${cardSize.width}px; height:${cardSize.height}px;`;
            emptyStock.innerHTML = '<div class="refresh-btn">↺</div>';
            emptyStock.addEventListener('click', resetStock);
            layer.appendChild(emptyStock);
        }

        // 繪製廢牌堆
        const wPos = slotPositions['slot-waste'];
        const wasteLen = state.waste.length;
        
        if (wasteLen > 0) {
            const wasteOverlap = cardSize.width * GAME_CONFIG.layout.wasteCardOverlap;
            if (wasteLen >= 3) {
                const displayCards = state.waste.slice(-3);
                for (let i = 0; i < 3; i++) {
                    const card = displayCards[i];
                    const offset = i * wasteOverlap;
                    drawCard(card, wPos.left, wPos.top, 'waste', 0, wasteLen - 3 + i, true, offset);
                }
            } else {
                for (let i = 0; i < wasteLen; i++) {
                    const card = state.waste[i];
                    const offset = i * wasteOverlap;
                    drawCard(card, wPos.left, wPos.top, 'waste', 0, i, true, offset);
                }
            }
        }

        // 繪製四個花色區
        for(let i=0; i<4; i++) {
            const pos = slotPositions[`slot-f${i}`];
            const pile = state.foundations[i];
            if (pile.length > 0) {
                drawCard(pile[pile.length-1], pos.left, pos.top, 'foundation', i, pile.length-1);
            }
        }

        // 繪製七列表格
        for(let i=0; i<7; i++) {
            const pos = slotPositions[`slot-t${i}`];
            const pile = state.tableau[i];
            let currentOffset = 0; // 當前偏移量
            pile.forEach((card, idx) => {
                if (idx > 0) {
                    const prevCard = pile[idx - 1];
                    
                    // 分開手機版和網頁版的重疊比例計算邏輯
                    let overlapRatio;
                    const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
                    
                    if (isMobile) {
                        if (prevCard.faceUp) {
                            overlapRatio = card.faceUp ? 0.5 : 0.9;
                        } else {
                            overlapRatio = 0.9;
                        }
                    } else {
                        if (prevCard.faceUp) {
                            overlapRatio = card.faceUp ? 0.7 : 0.9;
                        } else {
                            overlapRatio = 0.9;
                        }
                    }
                    
                    currentOffset += cardSize.height * (1 - overlapRatio); // 計算偏移量
                }
                drawCard(card, pos.left, pos.top + currentOffset, 'tableau', i, idx);
            });
        }
        
        // 更新魔法按鈕狀態
        updateMagicButton();
    }
    
    /**
     * 翻開表格中的卡片（cPoker301）
     * @param {number} pileIdx - 表格列索引
     */
    function flipTableauCard(pileIdx) {
        if (isAutoFlying || isAnimating) return;
        const pile = state.tableau[pileIdx];
        if (!pile.length) return;
        const topCard = pile[pile.length - 1];
        if (topCard.faceUp) return;

        saveStateToHistory();
        playFlipSound();
        isAnimating = true;

        const cardElement = findTableauCardDom(pileIdx, topCard);
        if (!cardElement) {
            topCard.faceUp = true;
            state.moves++;
            addScore(GAME_CONFIG.score.flipTableau);
            render();
            updateTimer();
            isAnimating = false;
            updateMagicButton();
            checkAutoFlyAfterMove();
            return;
        }

        playCpoker301TableauFlip(cardElement, topCard, () => {
            topCard.faceUp = true;
            state.moves++;
            addScore(GAME_CONFIG.score.flipTableau);
            render();
            updateTimer();
            isAnimating = false;
            updateMagicButton();
            checkAutoFlyAfterMove();
        });
    }

    // ==================== 翻牌動畫邏輯 ====================
    
    /**
     * 從牌堆抽牌（帶動畫，npoker165）
     */
    function drawStockWithAnimation() {
        if (isDrawing || isAutoFlying) return;
        if (state.stock.length === 0) {
            resetStock();
            return;
        }

        isDrawing = true;
        const drawCount = Math.min(state.drawMode === 1 ? 1 : 3, state.stock.length);
        const cardsToDraw = [];
        for (let i = 0; i < drawCount; i++) {
            const cardIndex = state.stock.length - 1 - i;
            cardsToDraw.unshift(state.stock[cardIndex]);
        }
        for (let i = 0; i < drawCount; i++) {
            state.stock.pop();
        }

        render();

        const stockSlot = document.getElementById('slot-stock');
        const wasteSlot = document.getElementById('slot-waste');
        if (!stockSlot || !wasteSlot) {
            isDrawing = false;
            return;
        }

        const stockRect = stockSlot.getBoundingClientRect();
        const wasteRect = wasteSlot.getBoundingClientRect();
        const drawSpeed = getCssTimeValue('--animation-draw-speed', 500);
        const flipDelay = getCssTimeValue('--animation-flip-delay', 500);
        const wasteOverlap = cardSize.width * GAME_CONFIG.layout.wasteCardOverlap;
        const animationCards = [];

        for (let i = 0; i < drawCount; i++) {
            const card = cardsToDraw[i];
            const animCard = document.createElement('div');
            animCard.className = 'card draw-animation-card back';
            animCard.style.left = stockRect.left + 'px';
            animCard.style.top = stockRect.top + 'px';
            animCard.style.width = cardSize.width + 'px';
            animCard.style.height = cardSize.height + 'px';
            animCard.style.position = 'fixed';
            animCard.style.zIndex = '9999';
            animCard.style.pointerEvents = 'none';
            animCard.dataset.text = card.text;
            animCard.style.backgroundColor = 'white';
            document.body.appendChild(animCard);
            animationCards.push({ card, element: animCard, index: i });
        }

        animationCards.forEach((item, animIndex) => {
            const { card, element: animCard, index: originalIndex } = item;
            void animCard.offsetWidth;

            let targetLeft;
            let targetTop;
            if (state.drawMode === 1) {
                const newWasteLen = state.waste.length + 1;
                const offset = newWasteLen >= 3 ? 2 * wasteOverlap : (newWasteLen - 1) * wasteOverlap;
                targetLeft = wasteRect.left + offset;
                targetTop = wasteRect.top;
            } else {
                targetLeft = wasteRect.left + (originalIndex * wasteOverlap);
                targetTop = wasteRect.top;
            }

            setTimeout(() => {
                animCard.style.transition = `left ${drawSpeed / 1000}s ease, top ${drawSpeed / 1000}s ease, transform ${drawSpeed / 1000}s ease`;
                animCard.style.left = targetLeft + 'px';
                animCard.style.top = targetTop + 'px';
                animCard.style.transform = 'rotateY(90deg)';
                playFlipSound();

                setTimeout(() => {
                    applyFaceToAnimCard(animCard, card);
                    animCard.style.transform = 'rotateY(0deg)';
                }, drawSpeed / 2);
            }, animIndex * 30);
        });

        setTimeout(() => {
            animationCards.forEach(item => item.element.remove());
            cardsToDraw.forEach(card => {
                card.faceUp = true;
                state.waste.push(card);
            });
            state.moves++;
            addScore(GAME_CONFIG.score.stockDrawPerCard * drawCount);
            saveStateToHistory();
            render();
            updateTimer();
            isDrawing = false;
            updateMagicButton();
            checkAutoFlyAfterMove();
        }, flipDelay + (drawCount * 30));
    }

    /**
     * 重置牌堆（將廢牌堆放回牌堆）
     */
    function resetStock() {
        if (isDrawing || isAutoFlying) return; // 只檢查翻牌動畫狀態
        if (state.waste.length === 0) return;
        
        // 在三張模式下，需要保持廢牌堆的順序
        // 經典接龍規則：當牌堆用完時，將廢牌堆的牌翻轉後重新成為牌堆，順序不變
        state.stock = state.waste.reverse().map(c => { 
            c.faceUp = false; // 將牌面朝下
            return c; 
        });
        state.waste = []; // 清空廢牌堆
        state.moves++; // 增加移動次數
        addScore(GAME_CONFIG.score.recycleWaste); // 重新循環廢牌堆扣100分
        saveStateToHistory(); // 儲存狀態
        render(); // 重新渲染
        updateTimer(); // 更新計時器
        updateMagicButton(); // 更新魔法按鈕狀態
        // 檢查是否觸發自動飛牌
        checkAutoFlyAfterMove();
    }

    // ==================== 自動移動動畫函數 ====================
    /**
     * 執行卡片移動動畫 - 修復：為多張牌正確計算目標位置偏移
     * @param {Array} cards - 要移動的卡片陣列
     * @param {Object} sourceRect - 來源位置矩形
     * @param {Object} targetRect - 目標位置矩形（第一張牌的位置）
     * @param {Function} onComplete - 動畫完成後的回呼函數
     * @param {string} moveType - 移動類型 ('tableau', 'foundation', 'waste')
     * @param {number} overlapRatio - 重疊比例（可選，如果未提供則根據設備計算）
     */
    function animateMove(cards, sourceRect, targetRect, onComplete, moveType = 'tableau', overlapRatio = null) {
        isAnimating = true; // 標記動畫開始
        const ghosts = []; // 幽靈卡片陣列
        
        // 分開手機版和網頁版的重疊比例
        const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
        const actualOverlapRatio = overlapRatio !== null ? overlapRatio : (isMobile ? 0.5 : 0.7);
        
        // 計算每張牌之間的間距（露出部分的高度）
        // 修正：重疊比例為0.7意味著重疊70%，露出30%
        const spacingHeight = cardSize.height * (1 - actualOverlapRatio);
        
        // 建立幽靈卡片
        cards.forEach((card, i) => {
            const ghost = document.createElement('div');
            ghost.className = `card flying-card ${card.color}`;
            ghost.style.backgroundColor = 'white'; // 確保背景為白色
            
            // 添加data-text屬性
            ghost.dataset.text = card.text;
            
            // 針對數字10的特殊處理 - 只在手機版應用
            let numHtml = `<div class="card-num ${card.color}">${card.text}</div>`;
            if (card.text === "10" && isMobile) {
                // 如果是10且是手機版，添加特殊的CSS樣式
                numHtml = `<div class="card-num ${card.color}" style="font-size: 2.5rem; transform: scaleX(0.75); transform-origin: left top; left: 0.8px;">${card.text}</div>`;
            } else if (card.text === "10") {
                // 如果是10且是桌面版，使用正常樣式
                numHtml = `<div class="card-num ${card.color}" style="font-size: 1.8rem;">${card.text}</div>`;
            }
            
            ghost.innerHTML = `
                <div class="card-face">
                    ${numHtml}
                    <div class="card-suit-top ${card.color}">${card.suit}</div>
                    <div class="card-center-suit ${card.color}">${card.suit}</div>
                </div>
            `;
            
            // 計算堆疊偏移量
            const ghostOffset = i * spacingHeight;
            
            // 設定初始位置
            ghost.style.left = sourceRect.left + 'px';
            ghost.style.top = (sourceRect.top + ghostOffset) + 'px';
            ghost.style.width = cardSize.width + 'px';
            ghost.style.height = cardSize.height + 'px';
            
            document.body.appendChild(ghost);
            ghosts.push({ghost, offset: ghostOffset});
        });

        // 強制瀏覽器 Reflow 以確保動畫發生
        void ghosts[0].ghost.offsetWidth;

        // 設定目標位置 - 修復：每張牌都有正確的偏移
        ghosts.forEach((item) => {
            const {ghost, offset} = item;
            
            ghost.style.left = targetRect.left + 'px';
            ghost.style.top = (targetRect.top + offset) + 'px';
        });

        // 根據移動類型播放對應音效
        if (moveType === 'foundation') {
            playFoundationSound();
        } else {
            playMoveSound();
        }

        // 動畫結束後清理
        const moveMs = getCssTimeValue('--animation-move-speed', 150);
        setTimeout(() => {
            ghosts.forEach(g => g.ghost.remove());
            if (onComplete) onComplete();
            isAnimating = false;
            updateMagicButton();
        }, moveMs + 20);
    }

    // ==================== 魔法按鈕功能 ====================
    /**
     * 魔法移動：隨機翻開一張蓋牌並移動到廢牌堆
     */
    function magicMove() {
        if (isDrawing || isAutoFlying) return; // 只檢查翻牌動畫狀態和自動飛牌狀態
        
        // 收集所有蓋著的牌（只收集每列最上面一張蓋牌）
        const facedDownCards = [];
        for (let col = 0; col < 7; col++) {
            const pile = state.tableau[col];
            // 找到每列最上面一張蓋牌
            for (let i = pile.length - 1; i >= 0; i--) {
                if (!pile[i].faceUp) {
                    // 確保這是該列最上面的蓋牌（上面沒有其他蓋牌）
                    if (i === pile.length - 1 || pile[i+1].faceUp) {
                        facedDownCards.push({
                            card: pile[i],
                            pileIdx: col,
                            cardIdx: i,
                            pile: pile
                        });
                        break; // 只取最上面一張蓋牌
                    }
                }
            }
        }
        
        // 如果沒有蓋著的牌，禁用按鈕並返回
        if (facedDownCards.length === 0) {
            updateMagicButton();
            showMessage("沒有可翻開的蓋牌", 1500);
            return;
        }
        
        // 隨機選擇一張蓋牌
        const randomIndex = Math.floor(Math.random() * facedDownCards.length);
        const selected = facedDownCards[randomIndex];
        const { card, pileIdx, cardIdx, pile } = selected;
        
        // 先從表格中移除卡片
        pile.splice(cardIdx, 1);
        
        // 如果表格列還有牌，確保最上面一張是翻開的
        if (state.tableau[pileIdx].length > 0) {
            const newTopCard = state.tableau[pileIdx][state.tableau[pileIdx].length - 1];
            if (!newTopCard.faceUp) {
                newTopCard.faceUp = true;
            }
        }
        
        // 立即渲染一次，讓蓋牌消失，新的牌翻開
        render();
        
        isAnimating = true; // 標記動畫開始
        updateMagicButton(); // 更新魔法按鈕狀態
        
        // 取得廢牌堆位置
        const wasteSlot = document.getElementById('slot-waste');
        if (!wasteSlot) return;
        
        const wasteRect = wasteSlot.getBoundingClientRect();
        
        // 獲取選中卡片的位置（注意：此時卡片已經從DOM中移除，我們需要之前記錄的位置）
        // 我們在更新狀態和渲染之前，先獲取卡片的位置
        const cardElement = document.querySelector(`[data-id="${card.id}"]`);
        let sourceRect;
        if (cardElement) {
            sourceRect = cardElement.getBoundingClientRect();
        } else {
            // 如果卡片元素不存在，則使用該列的slot位置（不精確，但作為備用）
            const slotEl = document.getElementById(`slot-t${pileIdx}`);
            if (slotEl) {
                sourceRect = slotEl.getBoundingClientRect();
            } else {
                // 如果都沒有，則使用廢牌堆的位置（這樣動畫就不會移動）
                sourceRect = wasteRect;
            }
        }
        
        // 創建魔法動畫卡片（帶加強版金光閃閃效果）
        const magicCard = document.createElement('div');
        magicCard.className = `card magic-animation-card back golden-glow`;
        magicCard.style.left = sourceRect.left + 'px';
        magicCard.style.top = sourceRect.top + 'px';
        magicCard.style.width = sourceRect.width + 'px';
        magicCard.style.height = sourceRect.height + 'px';
        
        // 添加data-text屬性
        magicCard.dataset.text = card.text;
        
        // 確保背景為白色
        magicCard.style.backgroundColor = 'white';
        
        document.body.appendChild(magicCard);
        
        // 強制瀏覽器 Reflow 以確保動畫發生
        void magicCard.offsetWidth;
        
        // 計算目標位置（廢牌堆最右邊的位置）
        let targetLeft, targetTop;
        if (state.drawMode === 3 && state.waste.length >= 3) {
            // 三張模式，已有三張牌，新牌放在最右邊
            targetLeft = wasteRect.left + (2 * (cardSize.width * 0.3));
        } else if (state.drawMode === 3 && state.waste.length < 3) {
            // 三張模式，牌不夠三張，新牌放在適當位置
            targetLeft = wasteRect.left + (state.waste.length * (cardSize.width * 0.3));
        } else {
            // 一張模式，新牌放在廢牌堆位置
            targetLeft = wasteRect.left;
        }
        targetTop = wasteRect.top;
        
        // 設置動畫
        magicCard.style.left = targetLeft + 'px';
        magicCard.style.top = targetTop + 'px';
        
        // 動畫中途翻開卡片
        setTimeout(() => {
            magicCard.classList.remove('back');
            magicCard.classList.add(card.color);
            
            // 針對數字10的特殊處理 - 只在手機版應用
            const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
            let numHtml = `<div class="card-num ${card.color}">${card.text}</div>`;
            if (card.text === "10" && isMobile) {
                // 如果是10且是手機版，添加特殊的CSS樣式
                numHtml = `<div class="card-num ${card.color}" style="font-size: 2.5rem; transform: scaleX(0.75); transform-origin: left top; left: 0.8px;">${card.text}</div>`;
            } else if (card.text === "10") {
                // 如果是10且是桌面版，使用正常樣式
                numHtml = `<div class="card-num ${card.color}" style="font-size: 1.8rem;">${card.text}</div>`;
            }
            
            magicCard.innerHTML = `
                <div class="card-face">
                    ${numHtml}
                    <div class="card-suit-top ${card.color}">${card.suit}</div>
                    <div class="card-center-suit ${card.color}">${card.suit}</div>
                </div>
            `;
            
            // 播放翻牌音效
            playFlipSound();
        }, 250);
        
        // 動畫完成後更新遊戲狀態：將牌添加到廢牌堆，並更新分數等
        setTimeout(() => {
            // 移除動畫卡片
            magicCard.remove();
            
            // 翻開卡片
            card.faceUp = true;
            
            // 添加到廢牌堆（最上面）
            state.waste.push(card);
            
            // 更新遊戲狀態
            state.moves++; // 增加移動次數
            addScore(GAME_CONFIG.score.magic); // 使用魔法扣20分
            addMagicCount(); // 增加魔法使用次數
            
            saveStateToHistory(); // 儲存狀態
            render(); // 重新渲染，讓廢牌堆顯示這張牌
            updateTimer(); // 更新計時器
            
            isAnimating = false; // 標記動畫結束
            updateMagicButton(); // 更新魔法按鈕狀態
            
            showMessage(`魔法發動！翻開了${card.text}${card.suit}`, 1500);
            // 檢查是否觸發自動飛牌
            checkAutoFlyAfterMove();
        }, 500);
    }
    
    // ==================== 雙擊自動移動邏輯 - 修復：正確計算多張牌的目標位置 ====================
/**
 * 處理雙擊事件
 * @param {string} type - 卡片類型
 * @param {number} pileIdx - 堆疊索引
 * @param {number} cardIdx - 卡片索引
 * @param {string} cardId - 卡片ID
 */
function handleDoubleClick(type, pileIdx, cardIdx, cardId) {
    if (type === 'foundation') return;
    if (isDrawing || isAutoFlying || isAnimating) return;
    if (drag.isDragging || drag.pending) return;
    
    let sourcePile, card, cardsToMove = [];
    if (type === 'tableau') {
        sourcePile = state.tableau[pileIdx];
        if (cardIdx < 0 || cardIdx >= sourcePile.length) return;
        card = sourcePile[cardIdx];
        if (!card.faceUp) return;
        
        // 檢查是否可以移動整疊牌
        for (let i = cardIdx + 1; i < sourcePile.length; i++) {
            if (!sourcePile[i].faceUp) {
                shakeCard(cardId);
                return;
            }
        }
        
        // 取得要移動的所有牌（從點擊的牌到最後一張）
        cardsToMove = sourcePile.slice(cardIdx);
    } else if (type === 'waste') {
        sourcePile = state.waste;
        if (cardIdx !== sourcePile.length - 1) return; // 只能移動最上面的牌
        card = sourcePile[cardIdx];
        cardsToMove = [card];
    } else {
        return;
    }

    // 取得來源位置 (用於動畫)
    const cardEl = document.querySelector(`[data-id="${cardId}"]`);
    if (!cardEl) return;
    const sourceRect = cardEl.getBoundingClientRect();
    
    // ==================== 修改：根據牌數決定優先級 ====================
    
    // 1. 如果是單張牌，先檢查花色區
    if (cardsToMove.length === 1) {
        for (let i = 0; i < 4; i++) {
            const foundation = state.foundations[i];
            if (canMoveToFoundation(card, foundation)) {
                // 花色區只能移動最上面的單張牌
                if (cardsToMove.length > 1) {
                    shakeCard(cardId); // 不能移動多張牌到花色區
                    return;
                }
                
                saveStateToHistory();
                let cardToFlip = null;
                let sourcePileIdx = null;
                if (type === 'tableau') {
                    sourcePileIdx = pileIdx;
                    const pile = state.tableau[pileIdx];
                    if (pile.length > 1) {
                        cardToFlip = pile[pile.length - 2];
                    }
                    state.tableau[pileIdx].splice(cardIdx, 1);
                } else if (type === 'waste') {
                    state.waste.pop();
                }
                
                render();
                
                const targetEl = document.getElementById(`slot-f${i}`);
                const targetRect = targetEl.getBoundingClientRect();
                
                animateMove(cardsToMove, sourceRect, targetRect, () => {
                    state.foundations[i].push(...cardsToMove);
                    state.moves++;
                    if (type === 'waste') {
                        addScore(GAME_CONFIG.score.toFoundation);
                    } else {
                        addScore(GAME_CONFIG.score.toFoundation);
                    }
                    const finishMove = () => {
                        saveStateToHistory();
                        render();
                        updateTimer();
                        updateMagicButton();
                        checkWin();
                        checkAutoFlyAfterMove();
                    };
                    if (cardToFlip && !cardToFlip.faceUp) {
                        runTableauFlipAfterAutoMove(sourcePileIdx, cardToFlip, finishMove);
                    } else {
                        finishMove();
                    }
                }, 'foundation', 0);
                playFoundationSound();
                return; 
            }
        }
    }
    
    // ==================== 修改結束 ====================
    
    // 2. 無論如何，都檢查七列表格（單張牌花色區檢查失敗，或多張牌直接檢查七列表格）
    for (let targetIdx = 0; targetIdx < 7; targetIdx++) {
        if (type === 'tableau' && targetIdx === pileIdx) continue;
        const targetPile = state.tableau[targetIdx];
        
        // 修復：當卡片是King且目標列是空列時，允許移動
        if (card.rank === 13 && targetPile.length === 0) {
            saveStateToHistory();
            let cardToFlip = null;
            let sourcePileIdx = null;
            if (type === 'tableau') {
                sourcePileIdx = pileIdx;
                const pile = state.tableau[pileIdx];
                if (pile.length > cardsToMove.length) {
                    cardToFlip = pile[pile.length - cardsToMove.length - 1];
                }
                state.tableau[pileIdx].splice(cardIdx, cardsToMove.length);
            } else if (type === 'waste') {
                state.waste.pop();
            }
            
            render();
            const needsFlip = cardToFlip && !cardToFlip.faceUp;
            const finishAfterMove = () => {
                saveStateToHistory();
                render();
                updateTimer();
                updateMagicButton();
                checkWin();
                checkAutoFlyAfterMove();
            };
            
            const targetEl = document.getElementById(`slot-t${targetIdx}`);
            const targetRect = targetEl.getBoundingClientRect();
            const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
            const overlapRatio = isMobile ? 0.5 : 0.7;
            
            animateMove(cardsToMove, sourceRect, targetRect, () => {
                state.tableau[targetIdx].push(...cardsToMove);
                state.moves++;
                if (type === 'waste') {
                    addScore(GAME_CONFIG.score.moveBasic);
                } else {
                    addScore(GAME_CONFIG.score.moveBasic * cardsToMove.length);
                }
                render();
                if (needsFlip) {
                    runTableauFlipAfterAutoMove(sourcePileIdx, cardToFlip, finishAfterMove, 0);
                } else {
                    finishAfterMove();
                }
            }, 'tableau', overlapRatio);
            playMoveSound();
            return;
        }
        
        // 標準移動規則檢查
        if (canMoveToTableau(card, targetPile)) {
            saveStateToHistory();
            let cardToFlip = null;
            let sourcePileIdx = null;
            if (type === 'tableau') {
                sourcePileIdx = pileIdx;
                const pile = state.tableau[pileIdx];
                if (pile.length > cardsToMove.length) {
                    cardToFlip = pile[pile.length - cardsToMove.length - 1];
                }
                state.tableau[pileIdx].splice(cardIdx, cardsToMove.length);
            } else if (type === 'waste') {
                state.waste.pop();
            }
            
            render();
            const needsFlip = cardToFlip && !cardToFlip.faceUp;
            const finishAfterMove = () => {
                saveStateToHistory();
                render();
                updateTimer();
                updateMagicButton();
                checkWin();
                checkAutoFlyAfterMove();
            };
            
            // 計算重疊比例
            let overlapRatio;
            const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
            
            if (targetPile.length > 0) {
                const topCard = targetPile[targetPile.length - 1];
                if (topCard.faceUp) {
                    // 目標列最上面一張牌是翻開的
                    // 重疊比例為0.7意味著重疊70%，露出30%
                    overlapRatio = isMobile ? 0.5 : 0.7;
                } else {
                    // 目標列最上面一張牌是蓋著的
                    // 重疊比例為0.9意味著重疊90%，露出10%
                    overlapRatio = 0.9;
                }
            } else {
                // 空列，使用正常重疊比例
                overlapRatio = isMobile ? 0.5 : 0.7;
            }
            
            // 計算目標位置
            let targetRect;
            if (targetPile.length > 0) {
                const topCardId = targetPile[targetPile.length - 1].id;
                const topCardEl = document.querySelector(`[data-id="${topCardId}"]`);
                if (topCardEl) {
                    const rect = topCardEl.getBoundingClientRect();
                    // 第一張牌放在目標列最上面一張牌的下面
                    // 重疊比例為0.7，所以距離 = 卡片高度 * (1 - 0.7) = 卡片高度 * 0.3
                    targetRect = { 
                        left: rect.left, 
                        top: rect.top + (cardSize.height * (1 - overlapRatio))
                    };
                } else {
                    const slotEl = document.getElementById(`slot-t${targetIdx}`);
                    targetRect = slotEl.getBoundingClientRect();
                }
            } else {
                const slotEl = document.getElementById(`slot-t${targetIdx}`);
                targetRect = slotEl.getBoundingClientRect();
            }

            animateMove(cardsToMove, sourceRect, targetRect, () => {
                state.tableau[targetIdx].push(...cardsToMove);
                state.moves++;
                if (type === 'waste') {
                    addScore(GAME_CONFIG.score.moveBasic);
                } else {
                    addScore(GAME_CONFIG.score.moveBasic * cardsToMove.length);
                }
                render();
                if (needsFlip) {
                    runTableauFlipAfterAutoMove(sourcePileIdx, cardToFlip, finishAfterMove, 0);
                } else {
                    finishAfterMove();
                }
            }, 'tableau', overlapRatio);
            playMoveSound();
            return;
        }
    }
    
    // 3. 如果都不能移動，則震動卡片
    shakeCard(cardId);
}
    
    /**
     * 震動卡片效果
     * @param {string} cardId - 卡片ID
     */
    function shakeCard(cardId) {
        const cardElement = document.querySelector(`[data-id="${cardId}"]`);
        if (cardElement) {
            cardElement.classList.remove('shake');
            void cardElement.offsetWidth; // 強制重繪
            cardElement.classList.add('shake');
            // 播放錯誤音效
            playErrorSound();
            setTimeout(() => { cardElement.classList.remove('shake'); }, 400);
        }
    }

    // ==================== 拖曳系統函數 ====================
    /**
     * 開始拖曳
     * @param {Event} e - 事件物件
     * @param {string} type - 卡片類型
     * @param {number} pileIdx - 堆疊索引
     * @param {number} cardIdx - 卡片索引
     */
    function startDrag(e, type, pileIdx, cardIdx) {
        if (isDrawing || isAutoFlying) return; // 只檢查翻牌動畫狀態和自動飛牌狀態
        e.stopPropagation(); // 停止事件冒泡
        
        const now = Date.now(); // 當前時間
        
        // 根據類型取得來源堆疊和卡片
        let sourcePile = (type === 'tableau') ? state.tableau[pileIdx] : (type === 'waste' ? state.waste : []);
        if (type === 'foundation') sourcePile = state.foundations[pileIdx];
        const clickedCard = sourcePile[cardIdx];
        if (!clickedCard) return;

        // 檢測是否為單擊
        if (autoMoveOnClick) {
            // 暫時記錄點擊信息，等待一段時間後再執行自動移動
            // 如果在等待期間有移動，則取消自動移動，轉為拖動
            clearTimeout(window.clickTimeout);
            window.clickTimeout = setTimeout(() => {
                if (!drag.isDragging && !drag.pending) {
                    handleDoubleClick(type, pileIdx, cardIdx, clickedCard.id);
                }
            }, 150);
        }
        
        // 雙擊檢測
        if (clickedCard.id === lastClickCardId && now - lastClickTime < 350) {
            clearTimeout(window.clickTimeout);
            handleDoubleClick(type, pileIdx, cardIdx, clickedCard.id);
            lastClickCardId = null;
            lastClickTime = 0;
            return;
        }
        
        lastClickCardId = clickedCard.id;
        lastClickTime = now;

        if (drag.isDragging || drag.pending) return; // 已在拖曳中

        if (!clickedCard.faceUp) return; // 背面朝上的牌不能拖曳
        
        // 在三張模式下，廢牌堆只能拖曳最上面的牌
        if (type === 'waste' && cardIdx !== sourcePile.length - 1) return;
        
        // 花色區的牌只能拖曳最上面的牌
        if ((type === 'waste' || type === 'foundation') && cardIdx !== sourcePile.length - 1) return;
        
        drag.pending = true; // 標記為等待拖曳
        drag.isDragging = false;
        
        // 取得觸控/滑鼠座標
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        drag.startX = clientX;
        drag.startY = clientY;
        drag.origin = { type, pileIdx, cardIdx };
        
        // 設定要拖曳的卡片
        drag.cards = [];
        if (type === 'tableau') {
            // 表格中拖曳從點擊位置到最下面的所有牌
            for (let i = cardIdx; i < sourcePile.length; i++) {
                drag.cards.push(sourcePile[i]);
            }
        } else {
            // 廢牌堆、花色區只能拖曳一張牌
            drag.cards.push(clickedCard);
        }

        // 取得遊戲區域邊界
        const gameBoard = document.getElementById('game-board');
        drag.gameBoardRect = gameBoard.getBoundingClientRect();
        
        // 計算偏移量
        const cardEl = document.querySelector(`[data-id="${clickedCard.id}"]`);
        if (cardEl) {
            const rect = cardEl.getBoundingClientRect();
            drag.offset.x = clientX - rect.left;
            drag.offset.y = clientY - rect.top;
        }

        // 添加事件監聽器
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('touchend', onDragEnd);
    }

    /**
     * 建立拖曳時的幽靈卡片
     */
    function createGhosts() {
        if (!drag.cards.length) return;
        
        const startCardEl = document.querySelector(`[data-id="${drag.cards[0].id}"]`);
        if (!startCardEl) return;
        const rect = startCardEl.getBoundingClientRect();

        // 為每張拖曳中的卡片建立幽靈卡片
        drag.cards.forEach((card, i) => {
            // 複製原始卡片元素，而不是創建新的
            const originalCardEl = document.querySelector(`[data-id="${card.id}"]`);
            if (!originalCardEl) return;
            
            const ghost = originalCardEl.cloneNode(true);
            ghost.className = `card dragging-card ${card.color}`;
            ghost.style.backgroundColor = 'white'; // 確保背景為白色
            
            // 移除所有事件監聽器
            ghost.replaceWith(ghost.cloneNode(true));
            
            // 分開手機版和網頁版的重疊比例
            const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
            // 重疊比例為0.7意味著重疊70%，露出30%
            const overlapRatio = isMobile ? 0.5 : 0.7;
            const spacingHeight = cardSize.height * (1 - overlapRatio); // 露出部分的高度
            const ghostOffset = i * spacingHeight;
            
            // 設定初始位置
            ghost.style.left = rect.left + 'px';
            ghost.style.top = (rect.top + ghostOffset) + 'px';
            ghost.style.width = rect.width + 'px';
            ghost.style.height = rect.height + 'px';
            ghost.style.position = 'fixed';
            ghost.style.zIndex = '9999';
            ghost.style.pointerEvents = 'none';
            ghost.style.boxShadow = '5px 5px 15px rgba(0,0,0,0.5)';
            ghost.style.opacity = '0.9';
            ghost.style.transform = ''; // 清除任何transform
            
            // 移除任何可能影響顯示的額外樣式
            ghost.style.fontSize = '';
            ghost.style.transformOrigin = '';
            
            // 添加到文檔
            document.body.appendChild(ghost);
            drag.elGhosts.push(ghost);
        });

        // 將原始卡片設為半透明
        drag.cards.forEach(card => {
            const el = document.querySelector(`[data-id="${card.id}"]`);
            if (el) el.style.opacity = '0.3';
        });
    }

    /**
     * 拖曳移動處理函數
     * @param {Event} e - 事件物件
     */
    function onDragMove(e) {
        if (!drag.pending && !drag.isDragging) return;
        
        // 取得觸控/滑鼠座標
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        // 檢查是否真正開始拖曳（移動距離超過5px）
        if (drag.pending) {
            const moveX = Math.abs(clientX - drag.startX);
            const moveY = Math.abs(clientY - drag.startY);
            
            if (moveX > 5 || moveY > 5) {
                drag.pending = false;
                drag.isDragging = true;
                createGhosts(); // 建立幽靈卡片
            } else {
                return;
            }
        }
        
        // 更新幽靈卡片位置
        if (drag.isDragging) {
            if (e.cancelable) e.preventDefault(); // 防止預設行為
            
            drag.elGhosts.forEach((el, i) => {
                // 分開手機版和網頁版的重疊比例
                const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
                // 重疊比例為0.7意味著重疊70%，露出30%
                const overlapRatio = isMobile ? 0.5 : 0.7;
                const spacingHeight = cardSize.height * (1 - overlapRatio); // 露出部分的高度
                const ghostOffset = i * spacingHeight;
                
                el.style.left = (clientX - drag.offset.x) + 'px';
                el.style.top = (clientY - drag.offset.y + ghostOffset) + 'px';
            });
        }
    }

    /**
     * 拖曳結束處理函數 - 修正移動位置計算問題
     * @param {Event} e - 事件物件
     */
    function onDragEnd(e) {
        // 移除事件監聽器
        document.removeEventListener('mousemove', onDragMove);
        document.removeEventListener('mouseup', onDragEnd);
        document.removeEventListener('touchmove', onDragMove);
        document.removeEventListener('touchend', onDragEnd);

        // 處理等待拖曳狀態
        if (drag.pending) {
            drag.pending = false;
            return;
        }

        if (!drag.isDragging) return; // 未在拖曳中

        // 取得幽靈卡片位置（使用第一張幽靈卡片作為參考點）
        const headGhost = drag.elGhosts[0];
        if (!headGhost) return;
        
        const ghostRect = headGhost.getBoundingClientRect();
        
        // 計算幽靈卡片的中心點（相對於遊戲區域）
        const ghostCenterX = ghostRect.left + ghostRect.width/2 - drag.gameBoardRect.left;
        const ghostCenterY = ghostRect.top + ghostRect.height/2 - drag.gameBoardRect.top;

        let target = null; // 目標位置
        let minDist = Infinity;
        
        // 增加吸附區域閾值 - 提高靈敏度
        const threshold = cardSize.width * 2.5; // 從卡片寬度的1倍增加到2.5倍
        
        // 檢查所有可能的目標槽位（花色區和表格列）
        const allSlots = [];
        
        // 花色區
        for (let i = 0; i < 4; i++) {
            const slotId = `slot-f${i}`;
            if (slotPositions[slotId]) {
                allSlots.push({
                    type: 'foundation',
                    idx: i,
                    cx: slotPositions[slotId].cx,
                    cy: slotPositions[slotId].cy
                });
            }
        }
        
        // 表格列 - 需要考慮每列最上面的卡片位置
        for (let i = 0; i < 7; i++) {
            const slotId = `slot-t${i}`;
            if (slotPositions[slotId]) {
                const pile = state.tableau[i];
                let targetX, targetY;
                
                if (pile.length > 0) {
                    // 如果列中有牌，計算最上面一張牌的中心位置
                    const topCard = pile[pile.length - 1];
                    const topCardElement = document.querySelector(`[data-id="${topCard.id}"]`);
                    if (topCardElement) {
                        const cardRect = topCardElement.getBoundingClientRect();
                        targetX = cardRect.left + cardRect.width/2 - drag.gameBoardRect.left;
                        targetY = cardRect.top + cardRect.height/2 - drag.gameBoardRect.top;
                    } else {
                        // 如果找不到卡片元素，使用槽位中心
                        targetX = slotPositions[slotId].cx;
                        targetY = slotPositions[slotId].cy;
                    }
                } else {
                    // 空列使用槽位中心
                    targetX = slotPositions[slotId].cx;
                    targetY = slotPositions[slotId].cy;
                }
                
                allSlots.push({
                    type: 'tableau',
                    idx: i,
                    cx: targetX,
                    cy: targetY
                });
            }
        }
        
        // 尋找最近的槽位
        for (let i = 0; i < allSlots.length; i++) {
            const slot = allSlots[i];
            const distX = ghostCenterX - slot.cx;
            const distY = ghostCenterY - slot.cy;
            const dist = Math.sqrt(distX * distX + distY * distY);
            
            if (dist < minDist) {
                minDist = dist;
                if (dist < threshold) {
                    target = { type: slot.type, idx: slot.idx };
                }
            }
        }

        // 嘗試移動卡片
        let success = false;
        if (target) {
            success = tryMove(drag.cards, drag.origin, target);
        }

        // 清理幽靈卡片
        drag.elGhosts.forEach(el => el.remove());
        drag.elGhosts = [];
        drag.isDragging = false;
        
        // 恢復原始卡片透明度
        drag.cards.forEach(card => {
            const el = document.querySelector(`[data-id="${card.id}"]`);
            if (el) el.style.opacity = '1';
        });

        // 根據移動結果更新遊戲（npoker165：成功時不在此 render／saveState，由 performMove 處理）
        if (success) {
            saveStateToHistory();
            state.moves++;
            updateTimer();
            updateMagicButton();
            checkWin();
            checkAutoFlyAfterMove();
        } else {
            render();
        }
    }

    /**
     * 嘗試移動卡片
     * @param {Array} cards - 要移動的卡片陣列
     * @param {Object} source - 來源資訊
     * @param {Object} target - 目標資訊
     * @returns {boolean} - 移動是否成功
     */
    function tryMove(cards, source, target) {
        if (!cards || cards.length === 0) return false;
        const moveCard = cards[0]; // 移動的第一張卡片
        
        // 移動到花色區
        if (target.type === 'foundation') {
            if (cards.length > 1) return false; // 花色區只能移動一張牌
            
            // 如果是從花色區移動到花色區，不允許
            if (source.type === 'foundation') return false;
            
            const foundation = state.foundations[target.idx];
            if (foundation.length === 0) {
                if (moveCard.rank !== 1) return false; // 空的花色區只能放Ace
            } else {
                const topCard = foundation[foundation.length - 1];
                if (moveCard.suit !== topCard.suit || moveCard.rank !== topCard.rank + 1) return false; // 必須同花色且連續
            }
            performMove(source, target, cards); // 執行移動
            return true;
        }
        
        // 移動到表格
        if (target.type === 'tableau') {
            if (source.type === 'tableau' && source.pileIdx === target.idx) return false; // 不能移動到同一列
            
            const tableau = state.tableau[target.idx];
            if (tableau.length === 0) {
                if (moveCard.rank !== 13) return false; // 空的表格列只能放King
            } else {
                const topCard = tableau[tableau.length - 1];
                if (moveCard.color === topCard.color || moveCard.rank !== topCard.rank - 1) return false; // 必須不同顏色且連續
            }
            performMove(source, target, cards); // 執行移動
            return true;
        }
        return false;
    }

    /**
     * 執行移動操作
     * @param {Object} source - 來源資訊
     * @param {Object} target - 目標資訊
     * @param {Array} cards - 要移動的卡片陣列
     */
    function performMove(source, target, cards) {
        let cardToFlip = null;
        let sourcePileIdx = null;
        let flipCardIndex = null;

        if (source.type === 'waste') {
            state.waste.splice(source.cardIdx, 1);
        } else if (source.type === 'tableau') {
            sourcePileIdx = source.pileIdx;
            const pile = state.tableau[source.pileIdx];
            if (pile.length > cards.length) {
                flipCardIndex = pile.length - cards.length - 1;
                cardToFlip = pile[flipCardIndex];
            }
            state.tableau[source.pileIdx].splice(source.cardIdx, cards.length);
        } else if (source.type === 'foundation') {
            state.foundations[source.pileIdx].splice(source.cardIdx, 1);
        }

        if (target.type === 'foundation') {
            state.foundations[target.idx].push(...cards);
            if (source.type === 'waste') {
                addScore(GAME_CONFIG.score.toFoundation);
            } else if (source.type === 'tableau') {
                addScore(GAME_CONFIG.score.toFoundation);
            }
            playFoundationSound();
        } else if (target.type === 'tableau') {
            state.tableau[target.idx].push(...cards);
            if (source.type === 'waste') {
                addScore(GAME_CONFIG.score.moveBasic);
            } else if (source.type === 'tableau') {
                addScore(GAME_CONFIG.score.moveBasic * cards.length);
            } else if (source.type === 'foundation') {
                addScore(GAME_CONFIG.score.foundationToTableau);
            }
            playMoveSound();
        }

        if (cardToFlip && !cardToFlip.faceUp) {
            isAnimating = true;
            render();

            setTimeout(() => {
                const cardElement = findTableauCardDom(sourcePileIdx, cardToFlip);
                if (cardElement) {
                    void cardElement.offsetWidth;
                    playFlipSound();
                    playCpoker301TableauFlip(cardElement, cardToFlip, () => {
                        if (sourcePileIdx !== null && flipCardIndex !== null) {
                            state.tableau[sourcePileIdx][flipCardIndex].faceUp = true;
                        } else {
                            cardToFlip.faceUp = true;
                        }
                        addScore(GAME_CONFIG.score.flipTableau);
                        render();
                        isAnimating = false;
                        checkAutoFlyAfterMove();
                    });
                    return;
                }

                cardToFlip.faceUp = true;
                addScore(GAME_CONFIG.score.flipTableau);
                render();
                isAnimating = false;
                playFlipSound();
                checkAutoFlyAfterMove();
            }, 100);
        } else {
            render();
            saveStateToHistory();
            checkAutoFlyAfterMove();
        }
    }

    // ==================== 自動飛牌系統 ====================
    
/**
 * 檢查是否可以觸發自動飛牌
 * 修改：添加調試日誌
 */
function checkAutoFlyCondition() {
    // 如果正在動畫中或正在自動飛牌，則不檢查
    if (isDrawing || isAutoFlying || isAnimating) {
        debugLog("自動飛牌條件：正在動畫中或正在自動飛牌");
        return false;
    }
    
    // 檢查自動飛牌開關是否開啟
    if (!state.autoFlyEnabled) {
        debugLog("自動飛牌條件：開關未開啟");
        return false;
    }
    
    // 檢查七列表格是否還有蓋牌
    let hasFaceDownCards = false;
    for (let col = 0; col < 7; col++) {
        const pile = state.tableau[col];
        for (let i = 0; i < pile.length; i++) {
            if (!pile[i].faceUp) {
                hasFaceDownCards = true;
                break;
            }
        }
        if (hasFaceDownCards) break;
    }
    
    // 修改：如果沒有蓋牌，檢查是否有可飛的牌
    if (!hasFaceDownCards) {
        debugLog("七列表格所有牌都已翻開，檢查是否有可飛的牌");
        const hasFlyable = hasFlyableCards();
        debugLog("自動飛牌條件：所有牌翻開且可飛=", hasFlyable);
        return hasFlyable;
    }
    
    debugLog("自動飛牌條件：七列表格還有蓋牌");
    return false;
}
    
/**
 * 檢查是否還有可飛的牌
 * 修改：改進檢查邏輯，優先檢查七列表格
 */
function hasFlyableCards() {
    debugLog("檢查是否有可飛的牌...");
    
    // 1. 優先檢查七列表格中是否有牌可以飛到花色區
    for (let col = 0; col < 7; col++) {
        const pile = state.tableau[col];
        if (pile.length === 0) continue;
        
        const card = pile[pile.length - 1];
        if (!card.faceUp) continue;
        
        for (let foundIdx = 0; foundIdx < 4; foundIdx++) {
            const foundation = state.foundations[foundIdx];
            if (canMoveToFoundation(card, foundation)) {
                console.log("七列表格有可飛的牌:", card.text + card.suit, "在第" + (col+1) + "列");
                return true;
            }
        }
    }
    
    // 2. 檢查廢牌堆中是否有牌可以飛到花色區
    if (state.waste.length > 0) {
        const wasteCard = state.waste[state.waste.length - 1];
        for (let foundIdx = 0; foundIdx < 4; foundIdx++) {
            const foundation = state.foundations[foundIdx];
            if (canMoveToFoundation(wasteCard, foundation)) {
                console.log("廢牌堆有可飛的牌:", wasteCard.text + wasteCard.suit);
                return true;
            }
        }
    }
    
    // 3. 檢查牌堆中是否有牌（翻牌後可能有可飛的牌）
    if (state.stock.length > 0) {
        console.log("牌堆有牌，翻牌後可能有可飛的牌");
        return true;
    }
    
    // 4. 檢查廢牌堆是否可以重置
    if (state.waste.length > 0) {
        console.log("廢牌堆有牌，重置後可能找到可飛的牌");
        return true;
    }
    
    // 5. 檢查表格間是否有可移動的牌（移動後可能釋放可飛的牌）
    for (let sourceCol = 0; sourceCol < 7; sourceCol++) {
        const sourcePile = state.tableau[sourceCol];
        if (sourcePile.length === 0) continue;
        
        const sourceCard = sourcePile[sourcePile.length - 1];
        if (!sourceCard.faceUp) continue;
        
        for (let targetCol = 0; targetCol < 7; targetCol++) {
            if (sourceCol === targetCol) continue;
            
            const targetPile = state.tableau[targetCol];
            
            // King可以移動到空列
            if (sourceCard.rank === 13 && targetPile.length === 0) {
                console.log("發現King可以移動到空列");
                return true;
            }
            
            // 標準移動規則
            if (targetPile.length > 0 && canMoveToTableau(sourceCard, targetPile)) {
                console.log("發現表格間移動:", sourceCard.text + sourceCard.suit, "從列" + (sourceCol+1) + "到列" + (targetCol+1));
                return true;
            }
        }
    }
    
    console.log("沒有發現可飛的牌");
    return false;
}

/**
 * 建立自動飛牌任務隊列
 * 修改：修正變數名為 state.tableau，並防止自動飛牌時的列間移動死循環
 */
function buildAutoFlyQueue() {
    // console.log("建立自動飛牌隊列...");
    autoFlyQueue = [];

    // 1. 優先檢查並收集所有可以移往「花色區 (Foundation)」的牌
    // 檢查 7 個排列區 (Tableau) 的最後一張牌
    for (let i = 0; i < 7; i++) {
        const pile = state.tableau[i]; // 修正點：使用 state.tableau
        if (pile.length > 0) {
            const card = pile[pile.length - 1];
            // 遍歷 4 個花色區，檢查是否可以飛上去
            for (let foundIdx = 0; foundIdx < 4; foundIdx++) {
                if (canMoveToFoundation(card, state.foundations[foundIdx])) {
                    autoFlyQueue.push({
                        type: 'tableau',
                        sourceCol: i,
                        sourceIdx: pile.length - 1,
                        card: card,
                        targetFoundation: foundIdx,
                        message: `自動飛牌：將第${i+1}列的${card.text}${card.suit}飛到花色區`
                    });
                    break; 
                }
            }
        }
    }

    // 檢查廢牌堆 (Waste) 的最後一張牌是否可以飛
    if (state.waste.length > 0) {
        const card = state.waste[state.waste.length - 1];
        for (let foundIdx = 0; foundIdx < 4; foundIdx++) {
            if (canMoveToFoundation(card, state.foundations[foundIdx])) {
                autoFlyQueue.push({
                    type: 'waste',
                    sourceIdx: state.waste.length - 1,
                    card: card,
                    targetFoundation: foundIdx,
                    message: `自動飛牌：將廢牌區的${card.text}${card.suit}飛到花色區`
                });
                break;
            }
        }
    }

    // 2. 只有在「非」自動飛牌狀態下（例如玩家點擊提示），才允許檢查列與列之間的移動
    // 這樣在全自動收尾階段，系統就不會把 K 移來移去造成死循環
    if (!isAutoFlying) {
        const tableauMoves = findTableauToTableauMoves(); // 調用您現有的尋找路徑函數
        if (tableauMoves.length > 0) {
            // 只取第一個有效移動
            autoFlyQueue.push(tableauMoves[0]);
        }
    }

    // 3. 如果還是沒事做，且牌堆還有牌，則嘗試翻牌
    if (autoFlyQueue.length === 0 && state.stock.length > 0) {
        autoFlyQueue.push({ type: 'draw', message: '自動飛牌：翻牌' });
    }

    // 4. 若隊列仍為空且牌堆已空，但廢牌堆仍有牌，則重置廢牌回補牌
    if (autoFlyQueue.length === 0 && state.stock.length === 0 && state.waste.length > 0) {
        autoFlyQueue.push({ type: 'reset', message: '自動飛牌：重置廢牌堆' });
    }
}

/**
 * 尋找表格間的移動
 */
function findTableauToTableauMoves() {
    let moves = [];
    
    for (let sourceCol = 0; sourceCol < 7; sourceCol++) {
        const sourcePile = state.tableau[sourceCol];
        if (sourcePile.length === 0) continue;
        
        const card = sourcePile[sourcePile.length - 1];
        if (!card.faceUp) continue;
        
        for (let targetCol = 0; targetCol < 7; targetCol++) {
            if (sourceCol === targetCol) continue;
            
            const targetPile = state.tableau[targetCol];
            
            // King可以移動到空列
            if (card.rank === 13 && targetPile.length === 0) {
                moves.push({
                    type: 'tableau-to-tableau',
                    sourceCol: sourceCol,
                    sourceIdx: sourcePile.length - 1,
                    targetCol: targetCol,
                    card: card,
                    priority: 8,
                    message: `自動飛牌：將第${sourceCol+1}列的${card.text}${card.suit}移到第${targetCol+1}列`
                });
                break;
            }
            
            // 標準移動規則
            if (targetPile.length > 0 && canMoveToTableau(card, targetPile)) {
                moves.push({
                    type: 'tableau-to-tableau',
                    sourceCol: sourceCol,
                    sourceIdx: sourcePile.length - 1,
                    targetCol: targetCol,
                    card: card,
                    priority: 9,
                    message: `自動飛牌：將第${sourceCol+1}列的${card.text}${card.suit}移到第${targetCol+1}列`
                });
                break;
            }
        }
    }
    
    return moves;
}
    
    
    
/**
 * 處理自動飛牌任務隊列
 * 優化：任務結束後立即掃描下一波，實現絲滑切換（例如 3 飛完立刻飛 4）
 */
function processAutoFlyQueue() {
    if (!isAutoFlying) return;

    // 如果目前的隊列空了，立即重新掃描（例如處理完所有 3 後，建立 4 的隊列）
    if (autoFlyQueue.length === 0) {
        buildAutoFlyQueue();
        
        // 如果重新建立後依然是空的，代表真的沒牌可動了，停止自動模式
        if (autoFlyQueue.length === 0) {
            isAutoFlying = false;
            checkWin(); // 執行最後的勝利檢查
            return;
        }
    }

    // 取出下一個任務
    const task = autoFlyQueue.shift();
    
    // 增加安全計數，配合 monitorAutoFlyState 監控
    autoFlyCycleCount++;

    // 執行對應的動畫與邏輯
    switch (task.type) {
        case 'tableau':
        case 'waste':
        case 'stock':
            performAutoFlyToFoundation(task); // 處理飛往花色區
            break;
            
        case 'tableau-to-tableau':
            performAutoFlyTableauToTableau(task); // 處理列間移動
            break;
            
        case 'draw':
            performAutoFlyDraw(task); // 處理翻牌
            break;
        
        case 'reset':
            performAutoFlyReset(task); // 重置廢牌堆回補牌
            break;
            
        case 'check':
            buildAutoFlyQueue();
            processAutoFlyQueue();
            break;
            
        default:
            // 遇到未知任務時，微小延遲後繼續，避免程序卡死
            setTimeout(() => {
                processAutoFlyQueue();
            }, 50);
    }
}
    
    /**
 * 執行翻牌並檢查任務（新增）
 * 翻牌後立即檢查是否可以飛
 */
function performAutoFlyDrawWithCheck(task) {
    if (state.stock.length === 0) {
        // 如果牌堆空了，重新建立隊列
        setTimeout(() => {
            buildAutoFlyQueue();
            processAutoFlyQueue();
        }, autoFlyTiming.queueDelay);
        return;
    }
    
    // 執行翻牌
    const drawCount = Math.min(state.drawMode, state.stock.length);
    const cardsToDraw = [];
    
    for (let i = 0; i < drawCount; i++) {
        const cardIndex = state.stock.length - 1 - i;
        cardsToDraw.unshift(state.stock[cardIndex]);
    }
    
    // 從遊戲狀態中移除這些牌
    for (let i = 0; i < drawCount; i++) {
        state.stock.pop();
    }
    
    // 將取出的牌加入廢牌堆
    cardsToDraw.forEach(card => {
        card.faceUp = true;
        state.waste.push(card);
    });
    
    state.moves++;
    addScore(GAME_CONFIG.score.moveBasic * drawCount);
    
    // 更新顯示
    updateStockPile();
    updateWastePile();
    updateTimer();
    
    // 翻牌後檢查廢牌堆最上面的牌是否可以飛
    if (state.waste.length > 0) {
        const wasteCard = state.waste[state.waste.length - 1];
        let canFlyNow = false;
        
        for (let foundIdx = 0; foundIdx < 4; foundIdx++) {
            const foundation = state.foundations[foundIdx];
            if (canMoveToFoundation(wasteCard, foundation)) {
                canFlyNow = true;
                // 立即創建飛牌任務
                autoFlyQueue.unshift({
                    type: 'waste',
                    sourceCol: 0,
                    sourceIdx: state.waste.length - 1,
                    card: wasteCard,
                    targetFoundation: foundIdx,
                    priority: 1,
                    message: `自動飛牌：將剛翻出的${wasteCard.text}${wasteCard.suit}飛到花色區`
                });
                break;
            }
        }
        
        if (canFlyNow) {
            console.log("翻牌後發現可飛的牌，立即處理");
            // 立即處理這個飛牌任務
            setTimeout(() => {
                processAutoFlyQueue();
            }, autoFlyTiming.queueDelay);
            return;
        }
    }
    
    // 如果翻牌後沒有可飛的牌，重新建立隊列
    setTimeout(() => {
        buildAutoFlyQueue();
        processAutoFlyQueue();
    }, autoFlyTiming.queueDelay);
}
    
    
    
/**
 * 執行飛到花色區的自動飛牌 - 修正：先獲取卡片位置再移除
 */
function performAutoFlyToFoundation(task) {
    if (isDrawing) return;
    
    const { type, sourceCol, sourceIdx, card, targetFoundation } = task;
    
    // 第一步：先獲取原位置（在移除牌之前）
    let sourceRect;
    const cardElement = document.querySelector(`[data-id="${card.id}"]`);
    if (cardElement) {
        // 如果找到卡片元素，使用卡片元素的實際位置
        sourceRect = cardElement.getBoundingClientRect();
    } else {
        // 如果找不到卡片元素，使用槽位位置作為備用
        if (type === 'tableau') {
            const slotElement = document.getElementById(`slot-t${sourceCol}`);
            if (slotElement) {
                sourceRect = slotElement.getBoundingClientRect();
            } else {
                sourceRect = { left: 100, top: 100, width: cardSize.width, height: cardSize.height };
            }
        } else if (type === 'waste') {
            const wasteSlot = document.getElementById('slot-waste');
            if (wasteSlot) {
                const wasteRect = wasteSlot.getBoundingClientRect();
                // 計算廢牌堆中該牌的偏移位置
                let offset = 0;
                if (state.drawMode === 3) {
                    const wasteLen = state.waste.length;
                    // 計算廢牌堆中該牌的顯示位置
                    // 如果是三張模式，顯示最近的3張牌
                    if (wasteLen >= 3) {
                        const displayIndex = sourceIdx - (wasteLen - 3);
                        if (displayIndex >= 0) {
                            offset = displayIndex * (cardSize.width * 0.3);
                        }
                    } else {
                        offset = sourceIdx * (cardSize.width * 0.3);
                    }
                }
                sourceRect = {
                    left: wasteRect.left + offset,
                    top: wasteRect.top,
                    width: cardSize.width,
                    height: cardSize.height
                };
            } else {
                sourceRect = { left: 200, top: 100, width: cardSize.width, height: cardSize.height };
            }
        } else if (type === 'stock') {
            const stockSlot = document.getElementById('slot-stock');
            if (stockSlot) {
                sourceRect = stockSlot.getBoundingClientRect();
            } else {
                sourceRect = { left: 300, top: 100, width: cardSize.width, height: cardSize.height };
            }
        }
    }
    
    // 第二步：從遊戲狀態中移除牌
    removeCardFromSourceBeforeAnimation(task);
    
    // 第三步：立即重新渲染，讓原位置的牌消失
    render();
    
    // 第四步：獲取目標位置
    const targetElement = document.getElementById(`slot-f${targetFoundation}`);
    if (!targetElement) {
        // 如果找不到目標，直接完成飛牌邏輯
        finishAutoFlyToFoundation(task);
        return;
    }
    
    const targetRect = targetElement.getBoundingClientRect();
    
    // 第五步：創建飛行動畫卡片
    const flyCard = document.createElement('div');
    flyCard.className = `card flying-card ${card.color}`;
    flyCard.style.backgroundColor = 'white';
    flyCard.dataset.text = card.text;
    
    // 針對數字10的特殊處理
    const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
    let numHtml = `<div class="card-num ${card.color}">${card.text}</div>`;
    if (card.text === "10" && isMobile) {
        numHtml = `<div class="card-num ${card.color}" style="font-size: 2.5rem; transform: scaleX(0.75); transform-origin: left top; left: 0.8px;">${card.text}</div>`;
    } else if (card.text === "10") {
        numHtml = `<div class="card-num ${card.color}" style="font-size: 1.8rem;">${card.text}</div>`;
    }
    
    flyCard.innerHTML = `
        <div class="card-face">
            ${numHtml}
            <div class="card-suit-top ${card.color}">${card.suit}</div>
            <div class="card-center-suit ${card.color}">${card.suit}</div>
        </div>
    `;
    
    // 設置初始位置（從原位置開始）
    flyCard.style.left = sourceRect.left + 'px';
    flyCard.style.top = sourceRect.top + 'px';
    flyCard.style.width = sourceRect.width + 'px';
    flyCard.style.height = sourceRect.height + 'px';
    
    document.body.appendChild(flyCard);
    
    // 強制瀏覽器Reflow
    void flyCard.offsetWidth;
    
    // 設置目標位置
    flyCard.style.left = targetRect.left + 'px';
    flyCard.style.top = targetRect.top + 'px';
    
    // 播放音效
    playFoundationSound();
    
    // 動畫完成後更新遊戲狀態
    setTimeout(() => {
        // 移除動畫卡片
        flyCard.remove();
        
        // 完成飛牌邏輯：將牌添加到目標位置
        finishAutoFlyToFoundation(task);
        
    }, 200);
}

/**
 * 執行翻牌任務（優化版）
 * 修改：翻牌後重新檢查狀態
 */
function performAutoFlyDraw(task) {
    // 模擬翻牌操作
    if (state.stock.length === 0) {
        // 如果牌堆空了，重新建立隊列
        setTimeout(() => {
            buildAutoFlyQueue();
            processAutoFlyQueue();
        }, autoFlyTiming.queueDelay);
        return;
    }
    
    // 執行翻牌
    const drawCount = Math.min(state.drawMode, state.stock.length);
    const cardsToDraw = [];
    
    for (let i = 0; i < drawCount; i++) {
        const cardIndex = state.stock.length - 1 - i;
        cardsToDraw.unshift(state.stock[cardIndex]);
    }
    
    // 從遊戲狀態中移除這些牌
    for (let i = 0; i < drawCount; i++) {
        state.stock.pop();
    }
    
    // 將取出的牌加入廢牌堆
    cardsToDraw.forEach(card => {
        card.faceUp = true;
        state.waste.push(card);
    });
    
    state.moves++;
    addScore(GAME_CONFIG.score.moveBasic * drawCount);
    
    // 更新顯示
    updateStockPile();
    updateWastePile();
    updateTimer();
    
    // 翻牌後重新建立隊列
    setTimeout(() => {
        buildAutoFlyQueue();
        processAutoFlyQueue();
    }, autoFlyTiming.queueDelay);
}

    /**
     * 更新特定表格列
     * @param {number} col - 列索引
     */
    function updateTableauColumn(col) {
        const pile = state.tableau[col];
        const pos = slotPositions[`slot-t${col}`];
        
        // 移除該列的所有卡片
        document.querySelectorAll(`[data-type="tableau"][data-pile-idx="${col}"]`).forEach(el => {
            el.remove();
        });
        
        // 重新繪製該列
        let currentOffset = 0;
        pile.forEach((card, idx) => {
            if (idx > 0) {
                const prevCard = pile[idx - 1];
                
                // 分開手機版和網頁版的重疊比例計算邏輯
                let overlapRatio;
                const isMobile = window.innerWidth < GAME_CONFIG.layout.mobileBreakpoint;
                
                if (isMobile) {
                    if (prevCard.faceUp) {
                        overlapRatio = card.faceUp ? 0.5 : 0.9;
                    } else {
                        overlapRatio = 0.9;
                    }
                } else {
                    if (prevCard.faceUp) {
                        overlapRatio = card.faceUp ? 0.7 : 0.9;
                    } else {
                        overlapRatio = 0.9;
                    }
                }
                
                // 修正：重疊比例為0.7意味著重疊70%，露出30%
                // 所以偏移量應該是卡片高度 * (1 - 重疊比例)
                currentOffset += cardSize.height * (1 - overlapRatio);
            }
            
            // 創建卡片元素
            const div = document.createElement('div');
            div.className = `card ${card.faceUp ? '' : 'back'}`;
            div.style.left = pos.left + 'px';
            div.style.top = pos.top + currentOffset + 'px';
            div.dataset.id = card.id;
            div.dataset.type = 'tableau';
            div.dataset.pileIdx = col;
            div.dataset.cardIdx = idx;
            div.dataset.text = card.text;

            if (card.faceUp) {
                div.classList.add(card.color);
                div.innerHTML = `
                    <div class="card-face">
                        <div class="card-num ${card.color}">${card.text}</div>
                        <div class="card-suit-top ${card.color}">${card.suit}</div>
                        <div class="card-center-suit ${card.color}">${card.suit}</div>
                    </div>
                `;
                
                // 添加拖曳事件監聽器
                div.addEventListener('mousedown', (e) => startDrag(e, 'tableau', col, idx));
                div.addEventListener('touchstart', (e) => startDrag(e, 'tableau', col, idx), {passive: false});
            } else {
                if (idx === pile.length - 1) {
                    const flipHandler = (e) => {
                        e.stopPropagation();
                        flipTableauCard(col);
                    };
                    div.addEventListener('click', flipHandler);
                    div.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        flipHandler(e);
                    }, { passive: false });
                }
            }
            
            document.getElementById('card-layer').appendChild(div);
        });
    }
